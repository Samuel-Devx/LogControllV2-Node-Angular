 <div class="container">
     <div class="mb-4 p-8 " class="new">
                <p-card header="New Product" class="mb-4">
                    <div class="card grid grid-cols-1 md:grid-cols-2 gap-4">
                <p-inputgroup>
                    <p-inputgroup-addon>
                        <i class="pi pi-box"></i>
                    </p-inputgroup-addon>
                    
                    <p-inputnumber [useGrouping]="false" [(ngModel)]="text1" placeholder="SKU"  limit="10"></p-inputnumber>
                </p-inputgroup>
                <p-inputgroup>
                     <p-inputgroup-addon>
                        <i class="pi pi-calculator"></i>
                     </p-inputgroup-addon>
                    <p-inputnumber inputId="integeronly" [(ngModel)]="text2" placeholder="Account" />
                </p-inputgroup>
                <p-inputgroup>
                    <p-inputgroup-addon>
                        <i class="pi pi-truck"></i>
                    </p-inputgroup-addon>
                    <input pInputText [(ngModel)]="text3" placeholder="Product" />
                </p-inputgroup>
                <p-inputgroup>
                     <p-inputgroup-addon>$</p-inputgroup-addon>
                    <p-inputnumber [(ngModel)]="number" placeholder="Price" />
                    <p-inputgroup-addon>.00</p-inputgroup-addon>
                </p-inputgroup>
            </div>
            <div class="flex gap-4 mt-1" class="actions">
                            <p-button label="Cancel" severity="secondary" class="w-full" [outlined]="true" styleClass="w-full" />
                            <p-button label="Create" class="w-full" styleClass="w-full" />
                        </div>
                </p-card>
            </div>
 </div>
