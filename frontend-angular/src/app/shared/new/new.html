<p-toast></p-toast>
<div class="container">

    <div class="new">

        <p-card header="New Product" class="mb-4">

            <div class="card grid grid-cols-1 md:grid-cols-2 gap-4">

                <p-inputgroup>
                    <p-inputgroup-addon>
                        <i class="pi pi-box"></i>
                    </p-inputgroup-addon>

                    <input
                        pInputText
                        [(ngModel)]="product.sku"
                        placeholder="SKU" />
                </p-inputgroup>

                <p-inputgroup>
                    <p-inputgroup-addon>
                        <i class="pi pi-calculator"></i>
                    </p-inputgroup-addon>

                    <p-inputnumber
                        [(ngModel)]="product.account"
                        placeholder="Amount">
                    </p-inputnumber>
                </p-inputgroup>

                <p-inputgroup>
                    <p-inputgroup-addon>
                        <i class="pi pi-truck"></i>
                    </p-inputgroup-addon>

                    <input
                        pInputText
                        [(ngModel)]="product.name"
                        placeholder="Product" />
                </p-inputgroup>

                <p-inputgroup>

                    <p-inputgroup-addon>$</p-inputgroup-addon>

                    <p-inputnumber
                        [(ngModel)]="product.price"
                        placeholder="Price">
                    </p-inputnumber>

                    <p-inputgroup-addon>.00</p-inputgroup-addon>

                </p-inputgroup>

            </div>

            <div class="actions flex gap-4 mt-4">

                <p-button
                    label="Cancel"
                    severity="secondary"
                    [outlined]="true"
                    (click)="clearForm()">
                </p-button>

                <p-button
                    label="Create"
                    (click)="createProduct()">
                </p-button>
            </div>

        </p-card>

    </div>

</div>
